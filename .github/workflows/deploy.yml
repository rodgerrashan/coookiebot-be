name: Deploy Backend

on:
  push:
    paths:
      - '**'
      - '!infra/**'
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_BASE_DIR: /opt/coookiebot-be
      APP_USER: appsvc
      APP_PORT: 5005
      SERVICE_NAME: coookiebot
      ENV_FILE: /etc/coookiebot-be.env
      DOMAIN_NAME: api.coookietrade.online
      SSL_CERT_PATH: /etc/letsencrypt/live/api.coookietrade.online/fullchain.pem
      SSL_KEY_PATH: /etc/letsencrypt/live/api.coookietrade.online/privkey.pem

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔥 Get server IP from Terraform
      - name: Get Infra Output
        id: get_ip
        working-directory: infra
        run: |
          terraform init -input=false
          echo "ip=$(terraform output -raw instance_ip)" >> $GITHUB_OUTPUT
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_KEY }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add known_hosts
        run: |
          ssh-keyscan -H ${{ steps.get_ip.outputs.ip }} >> ~/.ssh/known_hosts

      - name: Package backend source
        run: |
          tar \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='logs' \
            -czf /tmp/coookiebot-be.tgz .

      - name: Upload package
        run: |
          scp /tmp/coookiebot-be.tgz ubuntu@${{ steps.get_ip.outputs.ip }}:/tmp/coookiebot-be.tgz

      # 🔹 Setup server (first-time safe)
      - name: Run setup script
        run: |
          ssh ubuntu@${{ steps.get_ip.outputs.ip }} "sudo APP_BASE_DIR=$APP_BASE_DIR APP_USER=$APP_USER APP_PORT=$APP_PORT SERVICE_NAME=$SERVICE_NAME ENV_FILE=$ENV_FILE bash -s" < deploy/setup.sh

      # 🔹 Deploy backend
      - name: Deploy app
        run: |
          ssh ubuntu@${{ steps.get_ip.outputs.ip }} "sudo APP_BASE_DIR=$APP_BASE_DIR APP_USER=$APP_USER SERVICE_NAME=$SERVICE_NAME SOURCE_TARBALL=/tmp/coookiebot-be.tgz bash -s" < deploy/deploy.sh

      # 🔹 SSL
      - name: Setup SSL
        run: |
          ssh ubuntu@${{ steps.get_ip.outputs.ip }} "sudo DOMAIN_NAME=$DOMAIN_NAME CERTBOT_EMAIL='${{ secrets.CERTBOT_EMAIL }}' CERTBOT_ENABLED=true bash -s" < deploy/certbot.sh

      # 🔹 Configure HTTPS Nginx
      - name: Setup Nginx HTTPS
        run: |
          sed "s|__DOMAIN__|$DOMAIN_NAME|g; s|__APP_PORT__|$APP_PORT|g; s|__SSL_CERT__|$SSL_CERT_PATH|g; s|__SSL_KEY__|$SSL_KEY_PATH|g" deploy/nginx.conf > /tmp/nginx.conf
          scp /tmp/nginx.conf ubuntu@${{ steps.get_ip.outputs.ip }}:/tmp/nginx.conf
          ssh ubuntu@${{ steps.get_ip.outputs.ip }} "
            sudo mv /tmp/nginx.conf /etc/nginx/sites-available/myapp &&
            sudo rm -f /etc/nginx/sites-enabled/default &&
            sudo ln -sf /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/ &&
            sudo nginx -t &&
            sudo systemctl restart nginx
          "