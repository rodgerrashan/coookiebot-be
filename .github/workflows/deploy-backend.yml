name: Deploy Backend (PM2)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment archive
        run: |
          git archive --format=tar.gz --output=backend.tar.gz HEAD

      - name: Copy archive to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          source: backend.tar.gz
          target: /tmp

      - name: Deploy with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -euo pipefail

            APP_USER="appsvc"
            APP_BASE_DIR="/opt/cookiebot-be"
            RELEASE_DIR="$APP_BASE_DIR/releases/${{ github.sha }}"
            NODE_MAJOR="20"
            APP_NAME="cookiebot-be"
            ENV_FILE="/etc/cookiebot-be.env"

            # 👤 Ensure user exists
            if ! id -u "$APP_USER" >/dev/null 2>&1; then
              sudo useradd --system --create-home --shell /bin/bash "$APP_USER"
            fi

            # 📦 Install Node.js (ensure version 20)
            if ! command -v node >/dev/null 2>&1 || ! node -v | grep -q "v$NODE_MAJOR"; then
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg
              curl -fsSL https://deb.nodesource.com/setup_${NODE_MAJOR}.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # ⚙️ Install PM2 globally
            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            # 📁 Prepare directories
            sudo mkdir -p "$APP_BASE_DIR/releases"
            sudo mkdir -p "$RELEASE_DIR"

            # 📦 Extract build
            sudo tar -xzf /tmp/backend.tar.gz -C "$RELEASE_DIR"
            sudo rm -f /tmp/backend.tar.gz
            sudo chown -R "$APP_USER:$APP_USER" "$RELEASE_DIR"

            cd "$RELEASE_DIR"

            # 📦 Install dependencies
            sudo -u "$APP_USER" npm ci --omit=dev

            # 🔗 Update current symlink
            sudo ln -sfn "$RELEASE_DIR" "$APP_BASE_DIR/current"

            # 🔐 ENV setup (only first time)
            if [ ! -f "$ENV_FILE" ]; then
              printf '%s\n' \
                'NODE_ENV=production' \
                'PORT=5005' \
                '# MONGO_URI=' \
                '# JWT_SECRET=' \
                | sudo tee "$ENV_FILE" >/dev/null
              sudo chmod 600 "$ENV_FILE"
            fi

            # 🚀 Start or Reload using PM2
            cd "$APP_BASE_DIR/current"

            if sudo -u "$APP_USER" pm2 list | grep -q "$APP_NAME"; then
              echo "🔄 Reloading app..."
              sudo -u "$APP_USER" pm2 reload "$APP_NAME" --update-env
            else
              echo "🚀 Starting app..."
              sudo -u "$APP_USER" pm2 start npm --name "$APP_NAME" -- start
            fi

            # 💾 Save PM2 process list & enable startup
            sudo -u "$APP_USER" pm2 save
            sudo pm2 startup systemd -u "$APP_USER" --hp /home/$APP_USER | tail -n 1 | sudo bash

            # 🧹 Cleanup old releases (keep last 5)
            ls -dt $APP_BASE_DIR/releases/* | tail -n +6 | xargs -r sudo rm -rf
       
      - name: Health check
        run: |
          sleep 5
          curl --retry 5 --retry-delay 2 -fsS https://api.coookietrade.online/health