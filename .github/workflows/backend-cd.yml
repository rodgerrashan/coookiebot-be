name: Backend CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-prod-deploy
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/coookiebot-be

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize image owner for GHCR
        id: vars
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/coookiebot-be:latest
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/coookiebot-be:${{ github.sha }}

      - name: Deploy over SSH to Lightsail
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_REPO: ghcr.io/${{ steps.vars.outputs.owner_lc }}/coookiebot-be
          IMAGE_TAG: ${{ github.sha }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          PORT: ${{ secrets.PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CRYPTO_SECRET_KEY: ${{ secrets.CRYPTO_SECRET_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          READONLY_TOKEN: ${{ secrets.READONLY_TOKEN }}
          DERIV_APP_ID: ${{ secrets.DERIV_APP_ID }}
          FRONTEND_URLS: ${{ secrets.FRONTEND_URLS }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          envs: IMAGE_REPO,IMAGE_TAG,GHCR_USERNAME,GHCR_READ_TOKEN,PORT,NODE_ENV,MONGO_URI,JWT_SECRET,CRYPTO_SECRET_KEY,SENDER_EMAIL,SMTP_USER,SMTP_PASS,READONLY_TOKEN,DERIV_APP_ID,FRONTEND_URLS
          script_stop: true
          script: |
            set -euo pipefail

            mkdir -p /opt/coookiebot-be

            cat > /opt/coookiebot-be/.env <<EOF
            PORT=${PORT}
            NODE_ENV=${NODE_ENV}
            MONGO_URI=${MONGO_URI}
            JWT_SECRET=${JWT_SECRET}
            CRYPTO_SECRET_KEY=${CRYPTO_SECRET_KEY}
            SENDER_EMAIL=${SENDER_EMAIL}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            READONLY_TOKEN=${READONLY_TOKEN}
            DERIV_APP_ID=${DERIV_APP_ID}
            FRONTEND_URLS=${FRONTEND_URLS}
            EOF

            docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin <<< "${GHCR_READ_TOKEN}"
            docker pull "${IMAGE_REPO}:${IMAGE_TAG}"

            docker rm -f coookiebot-be || true
            docker run -d \
              --name coookiebot-be \
              --restart unless-stopped \
              --env-file /opt/coookiebot-be/.env \
              -p 80:5005 \
              "${IMAGE_REPO}:${IMAGE_TAG}"

            docker image prune -f
